        <h1 class="text-white text-lg font-bold mb-2 tracking-wide">

        <p class="text-[#949ba4] text-[11px] leading-relaxed mb-6 px-2 font-medium">
            Conecte-se via Discord para sincronizar seu passaporte e painéis públicos.
        </p>

        <button id="btn-discord" class="w-full bg-[#5865F2] hover:bg-[#4752C4] active:bg-[#3C45A5] text-white text-xs font-semibold py-2.5 px-4 rounded transition duration-200 flex items-center justify-center gap-2 shadow-md">

    <script>
        document.getElementById('btn-discord').addEventListener('click', () => {
            // O teu URL oficial do Discord OAuth2
            const OAUTH_URL = "https://discord.com/oauth2/authorize?client_id=1515318590885073087&response_type=code&redirect_uri=https%3A%2F%2Fdistritorp-eight.vercel.app&scope=identify"; 
            
            // Redireciona o utilizador imediatamente
            window.location.href = OAUTH_URL;
        });
    </script>
